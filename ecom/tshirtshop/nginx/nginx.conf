events {}

http {
    # Don't leak server version info
    server_tokens off;

    server {
        listen      3001 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Allow generous body sizes for file-upload requests that travel through
        # the Next.js catch-all proxy route on their way to the backend.
        client_max_body_size 50m;

        location / {
            proxy_pass         http://web:3000;
            proxy_http_version 1.1;

            # WebSocket support (used by Next.js HMR in dev; harmless in prod)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Port  3001;

            proxy_read_timeout 60s;
            # Disable response buffering so streaming responses (e.g. SSE) work
            proxy_buffering    off;
        }
    }
}
