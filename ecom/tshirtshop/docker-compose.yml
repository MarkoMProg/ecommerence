# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose – tshirtshop (production mode, self-signed TLS)
# ─────────────────────────────────────────────────────────────────────────────
#
# ── Prerequisites before the very first `docker compose up --build` ──────────
#
#   1. Regenerate the TLS cert with Docker SANs (run from apps/backend/):
#        node scripts/generate-tls-cert.mjs
#
# ── How to access ─────────────────────────────────────────────────────────────
#
#   Frontend  →  https://localhost:3001   (nginx TLS → Next.js)
#   Backend   →  https://localhost:3000   (NestJS TLS – Stripe webhooks / tools)
#
# ─────────────────────────────────────────────────────────────────────────────

services:


  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ecommerenceshop
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: "gT9#qV!s4rP@"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tshirtshop
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U postgres -d ecommerenceshop"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - tshirtshop
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped


  migrator:
    build:
      context:    .
      dockerfile: apps/backend/Dockerfile
      target:     migrator
    env_file:
      - apps/backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tshirtshop
    restart: "no"


  seeder:
    build:
      context:    .
      dockerfile: apps/backend/Dockerfile
      target:     seeder
    env_file:
      - apps/backend/.env.docker
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - tshirtshop
    restart: "no"

 

  backend:
    build:
      context:    .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - apps/backend/.env.docker
    volumes:
      - ./apps/backend/certs:/app/certs:ro
      - uploads:/app/public/uploads
    ports:
      - "3000:3000"
    depends_on:
      seeder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tshirtshop
    restart: unless-stopped

  web:
    build:
      context:    .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_RECAPTCHA_SITEKEY: "6LcLpGcsAAAAALTlJkb33AjGE4an7t8c8RN7rGfK"
    env_file:
      - apps/web/.env.docker
    volumes:
      - ./apps/backend/certs:/app/certs:ro
    depends_on:
      - backend
    networks:
      - tshirtshop
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "3001:3001"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/backend/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - tshirtshop
    restart: unless-stopped


networks:
  tshirtshop:

volumes:
  postgres_data:
  redis_data:
  uploads:
