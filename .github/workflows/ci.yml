# CI Pipeline — Build and Test
# Per docs/07-DEVOPS/ci-cd-guidelines.md
# Runs on push to main/master and on pull requests
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecom/tshirtshop

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tshirtshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecom/tshirtshop/package-lock.json

      - name: Install dependencies
        # WARNING: Uses npm install instead of npm ci because lightningcss optional
        # platform binaries (linux-x64-gnu) are not reliably installed with npm ci
        # in cross-platform monorepos. npm install resolves deps at CI time on Linux.
        run: npm install --prefer-offline --no-audit

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tshirtshop_test
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-long
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: npm run test --workspace=backend

      - name: Build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tshirtshop_test
          BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-long
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: npm run build
